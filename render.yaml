# Render Blueprint for the Ripple backend.
#
# This provisions the FastAPI web service and the managed Postgres source of
# truth. It contains NO secret values: DATABASE_URL is injected from the
# managed database and FRONTEND_ORIGIN is set per-environment in the Render
# dashboard. See docs/deployment.md for the runbook.
#
# GDELT ingestion runs on a schedule via a GitHub Actions workflow
# (.github/workflows/ingest.yml) rather than a Render cron service, because
# Render has no free tier for cron jobs. See docs/cicd.md.

databases:
  - name: ripple-postgres
    plan: free
    databaseName: ripple
    user: ripple

services:
  - type: web
    name: ripple-api
    runtime: python
    plan: free
    buildCommand: pip install uv && uv sync --project backend
    # Free-tier web services can't run a separate pre-deploy step, so the
    # (idempotent) migration runs as part of every boot instead.
    startCommand: >-
      uv run --project backend alembic -c backend/alembic.ini upgrade head &&
      uv run --project backend uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12"
      - key: DATABASE_URL
        fromDatabase:
          name: ripple-postgres
          property: connectionString
      # Comma-separated list of allowed browser origins (production + preview).
      - key: FRONTEND_ORIGIN
        sync: false
      - key: GDELT_BASE_URL
        value: https://api.gdeltproject.org/api/v2/doc/doc
