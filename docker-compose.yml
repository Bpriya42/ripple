services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ripple
      POSTGRES_USER: ripple
      POSTGRES_PASSWORD: ripple
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ripple -d ripple"]
      interval: 2s
      timeout: 3s
      retries: 20
    volumes:
      - ripple-postgres:/var/lib/postgresql/data

volumes:
  ripple-postgres:
