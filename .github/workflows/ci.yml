name: ci

on:
  push:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2

  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: ripple
          POSTGRES_USER: ripple
          POSTGRES_PASSWORD: ripple
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ripple -d ripple"
          --health-interval 2s
          --health-timeout 3s
          --health-retries 20
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          version: "0.7.17"
      - run: uv sync --project backend --extra dev
      - run: uv run --project backend alembic -c backend/alembic.ini upgrade head
      - run: uv run --project backend python scripts/import_graph.py
      - run: uv run --project backend python scripts/import_story_fixtures.py
      - run: uv run --project backend python scripts/export_openapi.py
      - run: git diff --exit-code docs/openapi.json
      - run: uv run --project backend ruff format --check backend/app backend/alembic backend/tests scripts
      - run: uv run --project backend ruff check backend/app backend/alembic backend/tests scripts
      - run: uv run --project backend mypy backend/app scripts
      - run: uv run --project backend pytest -v
      # Offline proof of the live GDELT path (inspection only; does not persist).
      - run: uv run --project backend python scripts/pull_gdelt_energy.py --dry-run
      # Offline proof of the enrichment pipeline (scripted provider; no network call).
      - run: uv run --project backend python scripts/explain_claim.py --demo

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npm run generate:api
        working-directory: frontend
      - run: git diff --exit-code frontend/src/api/schema.d.ts
      - run: npm run format:check
        working-directory: frontend
      - run: npm run lint
        working-directory: frontend
      - run: npm run typecheck
        working-directory: frontend
      - run: npm run test
        working-directory: frontend
      - run: npm run build
        working-directory: frontend
      - run: npx playwright install --with-deps chromium
        working-directory: frontend
      - run: npm run test:e2e
        working-directory: frontend

  deploy:
    needs: [gitleaks, backend, frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy
        run: curl -fsS -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
      - name: Trigger Vercel deploy
        run: curl -fsS -X POST "${{ secrets.VERCEL_DEPLOY_HOOK_URL }}"
