name: ci

on:
  push:
  pull_request:

jobs:
  milestone-0:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: ripple
          POSTGRES_USER: ripple
          POSTGRES_PASSWORD: ripple
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ripple -d ripple"
          --health-interval 2s
          --health-timeout 3s
          --health-retries 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
      - uses: astral-sh/setup-uv@v5
        with:
          version: "0.7.17"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: uv sync --project backend --extra dev
      - run: uv run --project backend alembic -c backend/alembic.ini upgrade head
      - run: uv run --project backend python scripts/import_graph.py
      - run: uv run --project backend ruff format --check backend/app backend/tests scripts
      - run: uv run --project backend ruff check backend/app backend/tests scripts
      - run: uv run --project backend mypy backend/app scripts
      - run: uv run --project backend pytest -v
      - run: npm ci --prefix frontend
      - run: npm --prefix frontend run format:check
      - run: npm --prefix frontend run lint
      - run: npm --prefix frontend run typecheck
      - run: npm --prefix frontend run test
      - run: npm --prefix frontend run build
